<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Rubik+Storm&display=swap');
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body{
            height: 100%;
            width: 100%;
        }
        #maindiv{
            background-color: rgb(255, 243, 230);
            height: 100%;
            width: 100%;
  font-family: "Oswald", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
        }

        #header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
        }

        nav{
            display: flex;
            gap: 10px;
        }

        nav a{
            text-decoration: none;
            color: black;
        }

        img{
            height: 15rem;
        }

        @media (max-width: 600px){
    nav {
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 0;
        background: white;
        width: 100%;
        display: none; /* hidden initially */
        text-align: center;
        padding: 1rem 0;
        width: 7rem;
    }

    nav.active {
        display: flex; /* show when active */
    }

    nav a {
        padding: 10px 0;
        display: block;
    }

    #navicon {
        display: block;
        cursor: pointer;
    }
}

@media (min-width: 601px){
    #navicon {
        display: none;
    }
}

#main {
    width: 100%;
    height: fit-content;
    display: grid;
    grid-template-columns: 1fr 1fr; /* 2 columns */
    grid-template-rows: auto auto;  /* 2 rows */
    gap: 20px;
    padding: 2rem;
    /* background-color: green; */
}

img{
    background-color: #fff;
}
    #footer{
        display: flex;
        justify-content: space-between;
        width: 100%;
        /* background-color: #fff; */
        position: absolute;
        bottom: .1rem;
        padding-left: 2rem;
        padding-right: 2rem;
        color: rgb(51, 130, 31);
    }

    #bgtoggle{
        height: 15px;
        width: 50px;
        background-color:  rgb(0, 0, 0);
        border-radius: 10%;
        position: relative;
                transition: .5s;
    }

     #bgtoggle:hover{
        transform: scale(1.5);
    }


    #bgtoggle i{
        position: absolute;
        color: white;
        overflow: hidden;
        left: 0px;
        width: 20px;

    }
   
    #bgtoggle :first-child.active{
        left:calc(50px - 20px);
        display: none;
    }

    #bgtoggle :last-child{
        left:calc(50px - 20px);
        display: none;
    }

    #bgtoggle :last-child.active{
        display: block;
    }

    </style>
</head>
<body>

    <div id="maindiv">
        <div id="header">
            <div id="webname">MY WEBSITE</div>

            <i class="fa-solid fa-list" id="navicon"></i>

                <nav id="navdisplay">
                    <a href="home" class="navitem">HOME</a>
                    <a href="notification" class="navitem">NOTIFICATION</a>
                    <a href="about" class="navitem">About</a>
                    
                </nav>

            <div id="bgtoggle">
                <i class="fa-solid fa-sun"></i>
                <i class="fa-solid fa-moon"></i>
            </div>
        </div>


        <div id="main">
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ut, atque.</p>
            <img src="nami.jpg" alt="">
            <img src="sanji.jpg" alt="">
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Repellat, perspiciatis!</p>
        </div>

        <div id="footer">
            <p>Lorem ipsum dolor sit amet.</p>
            <p>ONE PIECE</p>
        </div>
    </div>

    <script>
    const navicon = document.getElementById("navicon");
    const nav = document.getElementById("navdisplay");

    navicon.addEventListener("click", () => {
        nav.classList.toggle("active");
    });

    const bgtoggle = document.getElementById("bgtoggle");
    const bgtogglei = document.querySelector("#bgtoggle i");
    const bgtogglel = document.querySelector('#bgtoggle').lastElementChild;
    bgtoggle.addEventListener("click" , () => {
        console.log("hello");
        bgtogglei.classList.toggle("active");
        bgtogglel.classList.toggle("active");
    })

</script>
</body>
</html>
